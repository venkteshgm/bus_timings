<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextBus 47 Tracker</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-gradients">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <!-- Auth Section -->
        <div id="auth-section" class="glass-panel active">
            <div class="auth-header">
                <h1>NextBus <span class="highlight">47</span></h1>
                <p>Real-time TriMet tracking for Hillsboro campuses.</p>
            </div>
            
            <button id="login-btn" class="google-btn">
                <svg viewBox="0 0 24 24" class="google-icon"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/><path fill="none" d="M1 1h22v22H1z"/></svg>
                Sign in with Google
            </button>
            <div id="auth-error" class="error-msg hidden"></div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard-section" class="hidden">
            <header class="dashboard-header">
                <div>
                    <h2>Live Tracking</h2>
                    <p class="subtitle">TriMet Bus 47</p>
                </div>
                <div class="user-info">
                    <span id="user-email"></span>
                    <button id="logout-btn" class="logout-btn">Logout</button>
                </div>
            </header>

            <div id="loading-spinner" class="spinner-container">
                <div class="spinner"></div>
                <p>Fetching bus data...</p>
            </div>

            <div id="data-error" class="error-msg hidden"></div>

            <div class="cards-grid">
                <!-- Orenco Max Station Card -->
                <div class="glass-card" id="card-orenco">
                    <div class="card-header">
                        <h3>Orenco MAX Station</h3>
                        <span class="stop-id">Stop 9923</span>
                    </div>
                    <div class="arrivals-list" id="arrivals-orenco">
                        <!-- Arrival items injected here -->
                    </div>
                </div>

                <!-- Intel RA-1 Card -->
                <div class="glass-card" id="card-ra1">
                    <div class="card-header">
                        <h3>Intel RA-1 Lobby</h3>
                        <span class="stop-id">Stop 14593</span>
                    </div>
                    <div class="arrivals-list" id="arrivals-ra1">
                        <!-- Arrival items injected here -->
                    </div>
                </div>

                <!-- Intel RA-3 Card -->
                <div class="glass-card" id="card-ra3">
                    <div class="card-header">
                        <h3>Intel RA-3</h3>
                        <span class="stop-id">Stop 14595</span>
                    </div>
                    <div class="arrivals-list" id="arrivals-ra3">
                        <!-- Arrival items injected here -->
                    </div>
                </div>
            </div>
            
            <div class="refresh-container">
                <button id="refresh-btn" class="refresh-btn">Refresh Data</button>
                <p class="last-updated" id="last-updated-text"></p>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        
        // Expose Firebase tools to the global scope for app.js
        window.firebaseTools = { initializeApp, getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged };
    </script>
    
    <script type="module" src="app.js"></script>
</body>
</html>
